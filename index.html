<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dashboard Layout */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-6);
            margin-bottom: var(--space-8);
        }

        .dashboard-full {
            grid-column: 1 / -1;
        }

        .dashboard-half {
            grid-column: span 2;
        }

        .dashboard-three {
            grid-column: span 3;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: var(--space-4);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
        }

        .table-actions {
            display: flex;
            gap: var(--space-2);
        }

        .search-input {
            width: 18rem;
        }

        /* Chart Grid */
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--space-6);
        }

        /* Progress Cards */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-6);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
            .dashboard-half, .dashboard-three {
                grid-column: span 1;
            }
            .chart-grid, .progress-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .table-actions {
                flex-direction: column;
            }
            .search-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <shadcn-layout id="layout">
        <shadcn-sidebar slot="sidebar" id="sidebar"></shadcn-sidebar>
        <shadcn-topbar slot="topbar" id="topbar"></shadcn-topbar>
        <shadcn-main slot="main">
            <div id="app"></div>
        </shadcn-main>
    </shadcn-layout>

    <script type="module">
        import { LitElement, html, css } from 'https://cdn.jsdelivr.net/npm/lit@3.1.0/+esm';
        import './components/basic.js';
        import './components/layout.js';
        import './components/data.js';

        // Mock Data
        const statsData = [
            { title: 'Total Revenue', value: '$48,256', change: '+12.5%', changeType: 'positive' },
            { title: 'Active Users', value: '2,453', change: '+8.2%', changeType: 'positive' },
            { title: 'New Orders', value: '348', change: '-3.1%', changeType: 'negative' },
            { title: 'Conversion Rate', value: '3.24%', change: '+2.4%', changeType: 'positive' }
        ];

        const chartData = [
            { label: 'Mon', value: 4200 },
            { label: 'Tue', value: 3800 },
            { label: 'Wed', value: 5100 },
            { label: 'Thu', value: 4600 },
            { label: 'Fri', value: 6200 },
            { label: 'Sat', value: 5800 },
            { label: 'Sun', value: 4900 }
        ];

        const tableColumns = [
            { key: 'id', label: 'ID' },
            { key: 'customer', label: 'Customer' },
            { key: 'product', label: 'Product' },
            { key: 'amount', label: 'Amount',
                render: (val) => `$${val.toLocaleString()}` },
            { key: 'status', label: 'Status',
                render: (val) => {
                    const variants = {
                        'completed': 'success',
                        'pending': 'warning',
                        'cancelled': 'destructive'
                    };
                    return `<shadcn-badge variant="${variants[val] || 'outline'}">${val}</shadcn-badge>`;
                }
            },
            { key: 'date', label: 'Date' }
        ];

        const tableData = [
            { id: '#1001', customer: 'John Doe', product: 'Premium Plan', amount: 299, status: 'completed', date: '2024-01-15' },
            { id: '#1002', customer: 'Jane Smith', product: 'Basic Plan', amount: 99, status: 'pending', date: '2024-01-15' },
            { id: '#1003', customer: 'Bob Wilson', product: 'Enterprise', amount: 599, status: 'completed', date: '2024-01-14' },
            { id: '#1004', customer: 'Alice Brown', product: 'Premium Plan', amount: 299, status: 'cancelled', date: '2024-01-14' },
            { id: '#1005', customer: 'Charlie Davis', product: 'Basic Plan', amount: 99, status: 'completed', date: '2024-01-13' },
            { id: '#1006', customer: 'Eva Martinez', product: 'Premium Plan', amount: 299, status: 'pending', date: '2024-01-13' },
            { id: '#1007', customer: 'Frank Garcia', product: 'Enterprise', amount: 599, status: 'completed', date: '2024-01-12' },
            { id: '#1008', customer: 'Grace Lee', product: 'Basic Plan', amount: 99, status: 'completed', date: '2024-01-12' }
        ];

        const sidebarItems = [
            { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
            { id: 'orders', label: 'Orders', icon: 'orders' },
            { id: 'products', label: 'Products', icon: 'products' },
            { id: 'users', label: 'Users', icon: 'users' },
            { id: 'analytics', label: 'Analytics', icon: 'analytics' },
            { id: 'settings', label: 'Settings', icon: 'settings' }
        ];

        // Main App Component
        class DashboardApp extends LitElement {
            static styles = css`:host { display: block; }`;

            render() {
                return html`
                    <!-- Stats Cards -->
                    <div class="dashboard">
                        ${statsData.map(stat => html`
                            <shadcn-stat-card
                                title="${stat.title}"
                                value="${stat.value}"
                                change="${stat.change}"
                                change-type="${stat.changeType}"
                            >
                                <span slot="icon">${stat.title.charAt(0)}</span>
                            </shadcn-stat-card>
                        `)}
                    </div>

                    <!-- Charts Section -->
                    <div class="dashboard">
                        <div class="dashboard-three">
                            <h3 class="section-title">Revenue Overview</h3>
                            <shadcn-bar-chart
                                .data="${chartData}"
                                height="220"
                            ></shadcn-bar-chart>
                        </div>
                        <div class="dashboard-half">
                            <h3 class="section-title">Goals Progress</h3>
                            <div class="progress-grid" style="grid-template-columns: 1fr;">
                                <shadcn-progress value="75" color="primary">Monthly Target</shadcn-progress>
                                <shadcn-progress value="60" color="primary">Quarterly Goal</shadcn-progress>
                                <shadcn-progress value="85" color="primary">Annual Target</shadcn-progress>
                            </div>
                        </div>
                    </div>

                    <!-- Table Section -->
                    <div class="dashboard dashboard-full">
                        <div class="table-header">
                            <h3 class="section-title" style="margin: 0;">Recent Orders</h3>
                            <div class="table-actions">
                                <shadcn-input class="search-input" placeholder="Search orders..."></shadcn-input>
                                <shadcn-button variant="outline">Filter</shadcn-button>
                                <shadcn-button>Export</shadcn-button>
                            </div>
                        </div>
                        <shadcn-table
                            .columns="${tableColumns}"
                            .data="${tableData}"
                            selectable
                        ></shadcn-table>
                    </div>
                `;
            }
        }

        customElements.define('dashboard-app', DashboardApp);

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.items = sidebarItems;
            sidebar.activeItem = 'dashboard';

            const topbar = document.getElementById('topbar');
            topbar.title = 'Dashboard';
            topbar.breadcrumbs = ['Home', 'Dashboard'];

            document.getElementById('app').innerHTML = '<dashboard-app></dashboard-app>';

            sidebar.addEventListener('nav-change', (e) => {
                const id = e.detail.itemId;
                topbar.title = id.charAt(0).toUpperCase() + id.slice(1);
                topbar.breadcrumbs = ['Home', id.charAt(0).toUpperCase() + id.slice(1)];
            });

            document.getElementById('layout').addEventListener('menu-toggle', () => {
                sidebar.collapsed = !sidebar.collapsed;
            });
        });
    </script>
</body>
</html>
