<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauhaus Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f5f5f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: grid;
            grid-template-columns: 200px 400px 200px;
            grid-template-rows: 100px 400px 150px;
            gap: 0;
            max-width: 800px;
            margin: 50px auto;
        }

        /* 几何装饰区 */
        .geo-top {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            background: #c41e3a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .geo-top::after {
            content: '';
            width: 60px;
            height: 60px;
            background: #f5f5f5;
        }

        .geo-left {
            grid-column: 1 / 2;
            grid-row: 2 / 4;
            background: #0047ab;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
        }

        .geo-left::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid #f5f5f5;
        }

        .clock-container {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 2px solid #1a1a1a;
        }

        canvas {
            display: block;
        }

        .geo-right {
            grid-column: 3 / 4;
            grid-row: 1 / 4;
            background: #ffc72c;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .geo-right::before {
            content: '';
            width: 80px;
            height: 80px;
            border: 8px solid #1a1a1a;
        }

        .geo-bottom-left {
            grid-column: 1 / 2;
            grid-row: 4 / 5;
            background: #1a1a1a;
        }

        .geo-bottom-right {
            grid-column: 2 / 4;
            grid-row: 4 / 5;
            background: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .geo-bottom-right::after {
            content: 'STAHL';
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 8px;
        }

        /* 时钟标题 */
        .clock-title {
            margin-top: 20px;
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* 日期显示 */
        .date-display {
            margin-top: 10px;
            color: #808080;
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* 装饰线条 */
        .divider {
            position: fixed;
            background: #1a1a1a;
        }

        .divider-v {
            width: 2px;
            height: 100vh;
        }

        .divider-h {
            height: 2px;
            width: 100vw;
        }
    </style>
</head>
<body>
    <!-- 包豪斯几何构成 -->
    <div class="geo-top"></div>
    <div class="geo-left"></div>

    <div class="clock-container">
        <canvas id="clock"></canvas>
        <div class="clock-title">BAUHAUS</div>
        <div class="date-display" id="date"></div>
    </div>

    <div class="geo-right"></div>
    <div class="geo-bottom-left"></div>
    <div class="geo-bottom-right"></div>

    <script>
        const canvas = document.getElementById('clock');
        const ctx = canvas.getContext('2d');

        const SIZE = 320;
        const CENTER = SIZE / 2;
        const RADIUS = SIZE / 2 - 16;

        canvas.width = SIZE;
        canvas.height = SIZE;

        // 包豪斯配色
        const COLORS = {
            primary: '#c41e3a',    // 红
            secondary: '#0047ab',  // 蓝
            accent: '#ffc72c',     // 黄
            black: '#1a1a1a',
            gray: '#808080',
            white: '#ffffff'
        };

        function drawClock() {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();

            const smoothSeconds = seconds + milliseconds / 1000;

            // 清空
            ctx.fillStyle = COLORS.white;
            ctx.fillRect(0, 0, SIZE, SIZE);

            drawDecorativeRings();
            drawMarkers();
            drawHands(hours, minutes, smoothSeconds);
            drawCenter();

            // 更新日期
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            requestAnimationFrame(drawClock);
        }

        function drawDecorativeRings() {
            // 外框
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 10;
            ctx.stroke();

            // 内圈 - 三色弧
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, RADIUS - 35, -Math.PI / 2, 0);
            ctx.strokeStyle = COLORS.primary;
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(CENTER, CENTER, RADIUS - 42, 0, Math.PI / 2);
            ctx.strokeStyle = COLORS.secondary;
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(CENTER, CENTER, RADIUS - 49, Math.PI / 2, Math.PI);
            ctx.strokeStyle = COLORS.accent;
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function drawMarkers() {
            // 小时刻度
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const innerRadius = RADIUS - 30;
                const outerRadius = RADIUS - 8;

                const x1 = CENTER + Math.cos(angle) * innerRadius;
                const y1 = CENTER + Math.sin(angle) * innerRadius;
                const x2 = CENTER + Math.cos(angle) * outerRadius;
                const y2 = CENTER + Math.sin(angle) * outerRadius;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = COLORS.black;
                ctx.lineWidth = 3;
                ctx.lineCap = 'square';
                ctx.stroke();
            }

            // 分钟刻度
            for (let i = 0; i < 60; i++) {
                if (i % 5 === 0) continue;
                const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
                const innerRadius = RADIUS - 20;
                const outerRadius = RADIUS - 8;

                const x1 = CENTER + Math.cos(angle) * innerRadius;
                const y1 = CENTER + Math.sin(angle) * innerRadius;
                const x2 = CENTER + Math.cos(angle) * outerRadius;
                const y2 = CENTER + Math.sin(angle) * outerRadius;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = COLORS.gray;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 小时数字
            ctx.fillStyle = COLORS.black;
            ctx.font = 'bold 16px Helvetica Neue, Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 1; i <= 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const x = CENTER + Math.cos(angle) * (RADIUS - 50);
                const y = CENTER + Math.sin(angle) * (RADIUS - 50);
                ctx.fillText(i.toString(), x, y);
            }
        }

        function drawHands(hours, minutes, seconds) {
            // 时针（红）
            const hourAngle = (hours / 12) * Math.PI * 2 + (minutes / 60) * (Math.PI * 2 / 12) - Math.PI / 2;
            drawHand(hourAngle, RADIUS - 80, 8, COLORS.primary, true);

            // 分针（蓝）
            const minuteAngle = (minutes / 60) * Math.PI * 2 + (seconds / 60) * (Math.PI * 2 / 60) - Math.PI / 2;
            drawHand(minuteAngle, RADIUS - 50, 5, COLORS.secondary, true);

            // 秒针（黄）
            const secondAngle = (seconds / 60) * Math.PI * 2 - Math.PI / 2;
            drawHand(secondAngle, RADIUS - 30, 2, COLORS.accent, false, true);
        }

        function drawHand(angle, length, width, color, isRect, hasCounterweight = false) {
            ctx.save();
            ctx.translate(CENTER, CENTER);
            ctx.rotate(angle);

            ctx.beginPath();
            if (isRect) {
                ctx.rect(-8, -width / 2, length + 8, width);
            } else {
                ctx.moveTo(-15, 0);
                ctx.lineTo(length, 0);
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'square';
            ctx.stroke();

            if (hasCounterweight) {
                ctx.beginPath();
                ctx.arc(-15, 0, 6, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            }

            ctx.restore();
        }

        function drawCenter() {
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, 5, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.primary;
            ctx.fill();
        }

        drawClock();
    </script>
</body>
</html>
